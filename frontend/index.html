<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00674F" />
  <!-- Arama Motorlarından Gizle - Kaldırmak için bu satırları silin -->
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="description" content="Hac ve Umre turlarını AI ile karşılaştırın" />
  <title>Hac &amp; Umre Platformu - AI ile Tur Karşılaştırma</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet">

  <!-- Preconnect to APIs for faster loading -->
  <link rel="preconnect" href="https://viwbxolkhvgxpvgtukic.supabase.co">
  <link rel="dns-prefetch" href="https://viwbxolkhvgxpvgtukic.supabase.co">

  <!-- Password Gate Styles -->
  <style id="password-gate-styles">
    #password-gate {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a1628 0%, #1a2942 50%, #0d2137 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      font-family: 'Inter', sans-serif;
    }

    #password-gate.hidden {
      display: none;
    }

    .gate-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      padding: 2.5rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .gate-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .gate-title {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .gate-subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .gate-input {
      width: 100%;
      padding: 0.875rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }

    .gate-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .gate-button {
      width: 100%;
      padding: 0.875rem 1rem;
      border-radius: 0.5rem;
      border: none;
      background: linear-gradient(135deg, #00674F 0%, #00896b 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .gate-error {
      color: #ff6b6b;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }

    .gate-footer {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      margin-top: 1.5rem;
    }
  </style>
</head>

<body>
  <!-- Password Gate -->
  <div id="password-gate">
    <div class="gate-card">
      <div class="gate-icon">🔒</div>
      <h1 class="gate-title">Hac & Umre Platformu</h1>
      <p class="gate-subtitle">Bu site şu anda özel erişime açıktır</p>
      <form id="gate-form">
        <input type="password" id="gate-password" class="gate-input" placeholder="Erişim şifresi" autofocus />
        <p id="gate-error" class="gate-error">Yanlış şifre. Lütfen tekrar deneyin.</p>
        <button type="submit" class="gate-button">Giriş Yap</button>
      </form>
      <p class="gate-footer">Erişim için şifreye ihtiyacınız var</p>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>

  <!-- Password Gate Script -->
  <script>
    (function () {
      var SITE_PASSWORD = 'batman72+';
      var STORAGE_KEY = 'site_access_granted_v2';
      var gate = document.getElementById('password-gate');
      var form = document.getElementById('gate-form');
      var input = document.getElementById('gate-password');
      var error = document.getElementById('gate-error');

      // Check if already authenticated
      if (sessionStorage.getItem(STORAGE_KEY) === 'true') {
        gate.classList.add('hidden');
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (input.value === SITE_PASSWORD) {
          sessionStorage.setItem(STORAGE_KEY, 'true');
          gate.classList.add('hidden');
        } else {
          error.style.display = 'block';
          input.value = '';
          input.focus();
        }
      });
    })();
  </script>
</body>

</html>
